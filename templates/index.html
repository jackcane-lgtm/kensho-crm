<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kensho's London Dream Internship Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: #FDF8F5; color: #4a4a4a; }
        
        .header { background: linear-gradient(135deg, #E0B0FF 0%, #D4A5FF 100%); color: #3d3d3d; padding: 25px 30px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 1.4rem; font-weight: 600; letter-spacing: -0.5px; }
        
        .stats { display: flex; gap: 15px; }
        .stat { text-align: center; background: rgba(255,255,255,0.4); padding: 10px 18px; border-radius: 12px; backdrop-filter: blur(5px); }
        .stat-value { font-size: 1.4rem; font-weight: 700; color: #6B3FA0; }
        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.8; }
        
        .tabs { display: flex; background: #FFFBF8; border-bottom: 1px solid #f0e6e0; }
        .tab { padding: 16px 30px; cursor: pointer; border-bottom: 3px solid transparent; font-weight: 500; font-size: 0.95rem; transition: all 0.2s; }
        .tab:hover { background: #FFF5F0; }
        .tab.active { border-bottom-color: #E0B0FF; color: #9932CC; background: #FFF5F0; }
        
        .controls { padding: 15px 30px; background: #FFFBF8; border-bottom: 1px solid #f0e6e0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
        .search { padding: 10px 16px; border: 2px solid #f0e6e0; border-radius: 25px; width: 250px; font-family: 'Poppins', sans-serif; transition: all 0.2s; }
        .search:focus { outline: none; border-color: #E0B0FF; background: white; }
        .filter-select { padding: 10px 16px; border: 2px solid #f0e6e0; border-radius: 25px; background: white; font-family: 'Poppins', sans-serif; cursor: pointer; }
        .filter-select:focus { outline: none; border-color: #E0B0FF; }
        
        .add-btn { background: linear-gradient(135deg, #E0B0FF 0%, #C9A0FF 100%); color: #3d3d3d; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.85rem; margin-left: auto; transition: all 0.2s; box-shadow: 0 2px 8px rgba(224,176,255,0.4); }
        .add-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(224,176,255,0.5); }
        
        .content { padding: 25px 30px; }
        
        .table-container { background: #FFFBF8; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.04); overflow: hidden; border: 1px solid #f0e6e0; }
        table { width: 100%; border-collapse: collapse; }
        th { background: #FFF5F0; padding: 14px 16px; text-align: left; font-weight: 600; font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #f0e6e0; }
        td { padding: 14px 16px; border-bottom: 1px solid #f5ebe5; vertical-align: top; }
        tr:hover { background: #FFF9F5; }
        tr:last-child td { border-bottom: none; }
        
        .status-select { padding: 6px 12px; border: 2px solid #f0e6e0; border-radius: 20px; font-size: 0.8rem; background: white; font-family: 'Poppins', sans-serif; cursor: pointer; transition: all 0.2s; }
        .status-select:hover { border-color: #E0B0FF; }
        .status-select.sent { background: #F5E6FF; border-color: #E0B0FF; }
        .status-select.positive { background: #E8F5E9; border-color: #81C784; }
        .status-select.negative { background: #FFEBEE; border-color: #E57373; }
        
        .badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-engaged { background: #E8F5E9; color: #2E7D32; }
        .badge-pending { background: #F5E6FF; color: #7B1FA2; }
        .badge-none { background: #f5f5f5; color: #999; }
        
        .link { color: #9932CC; text-decoration: none; font-weight: 500; }
        .link:hover { text-decoration: underline; }
        
        .copy-btn { background: linear-gradient(135deg, #E0B0FF 0%, #C9A0FF 100%); color: #3d3d3d; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.8rem; font-weight: 600; font-family: 'Poppins', sans-serif; transition: all 0.2s; }
        .copy-btn:hover { transform: translateY(-1px); }
        .copy-btn.copied { background: linear-gradient(135deg, #81C784 0%, #66BB6A 100%); color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(3px); }
        .modal.open { display: flex; }
        .modal-content { background: #FFFBF8; padding: 30px; border-radius: 20px; max-width: 700px; width: 90%; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.15); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-header h2 { color: #7B1FA2; font-weight: 600; }
        .modal-close { background: none; border: none; font-size: 1.8rem; cursor: pointer; color: #ccc; transition: color 0.2s; }
        .modal-close:hover { color: #999; }
        .email-preview { background: #FFF5F0; padding: 25px; border-radius: 12px; white-space: pre-wrap; font-family: Georgia, serif; font-size: 0.95rem; line-height: 1.7; border: 2px solid #f0e6e0; }
        
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 0.9rem; color: #666; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px 16px; border: 2px solid #f0e6e0; border-radius: 12px; font-family: 'Poppins', sans-serif; font-size: 0.95rem; transition: all 0.2s; background: white; }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus { outline: none; border-color: #E0B0FF; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        
        .submit-btn { background: linear-gradient(135deg, #E0B0FF 0%, #C9A0FF 100%); color: #3d3d3d; border: none; padding: 14px 28px; border-radius: 25px; cursor: pointer; font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 1rem; width: 100%; margin-top: 10px; transition: all 0.2s; box-shadow: 0 4px 15px rgba(224,176,255,0.4); }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(224,176,255,0.5); }
        
        .truncate { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .small { font-size: 0.8rem; color: #888; }
        
        .empty { text-align: center; padding: 60px; color: #bbb; font-style: italic; }
        
        strong { font-weight: 600; color: #3d3d3d; }
        
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 15px; text-align: center; }
            .header h1 { font-size: 1.2rem; }
            .stats { flex-wrap: wrap; justify-content: center; }
            .controls { flex-direction: column; }
            .search { width: 100%; }
            .add-btn { margin: 10px 0 0 0; width: 100%; }
            .content { padding: 15px; }
            td, th { padding: 10px 12px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>✨ Kensho's London Dream Internship Tracker</h1>
        <div class="stats">
            <div class="stat"><div class="stat-value" id="stat-museums">-</div><div class="stat-label">Museums</div></div>
            <div class="stat"><div class="stat-value" id="stat-contacts">-</div><div class="stat-label">Contacts</div></div>
            <div class="stat"><div class="stat-value" id="stat-emails">-</div><div class="stat-label">With Email</div></div>
            <div class="stat"><div class="stat-value" id="stat-sent">-</div><div class="stat-label">Sent</div></div>
            <div class="stat"><div class="stat-value" id="stat-replies">-</div><div class="stat-label">Replies</div></div>
        </div>
    </div>
    
    <div class="tabs">
        <div class="tab active" data-tab="museums">Museums</div>
        <div class="tab" data-tab="contacts">Contacts</div>
    </div>
    
    <div class="controls">
        <input type="text" class="search" id="search" placeholder="Search...">
        <select class="filter-select" id="filter-interest">
            <option value="">All Interest</option>
            <option value="Yes">Interested</option>
            <option value="Maybe">Maybe</option>
            <option value="No">Not Interested</option>
            <option value="Applied">Applied</option>
        </select>
        <select class="filter-select" id="filter-status" style="display:none;">
            <option value="">All Status</option>
            <option value="not-sent">Not Sent</option>
            <option value="sent">Sent</option>
            <option value="replied">Replied</option>
        </select>
        <select class="filter-select" id="filter-has-email" style="display:none;">
            <option value="">All Contacts</option>
            <option value="yes">Has Email</option>
            <option value="no">No Email</option>
        </select>
        <button class="add-btn" id="add-btn" onclick="openAddModal()">+ Add New</button>
    </div>
    
    <div class="content">
        <div id="museums-view" class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Museum</th>
                        <th>Address</th>
                        <th>Personalization</th>
                        <th>Interest</th>
                        <th>Contacts</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="museums-body"></tbody>
            </table>
        </div>
        
        <div id="contacts-view" class="table-container" style="display:none;">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Title</th>
                        <th>Museum</th>
                        <th>Email</th>
                        <th>Email Status</th>
                        <th>LinkedIn</th>
                        <th>Reply</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="contacts-body"></tbody>
            </table>
        </div>
    </div>
    
    <!-- Email Modal -->
    <div class="modal" id="email-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>✉️ Personalized Email</h2>
                <button class="modal-close" onclick="closeModal('email-modal')">&times;</button>
            </div>
            <div class="email-preview" id="email-preview"></div>
            <br>
            <button class="copy-btn" id="modal-copy-btn" onclick="copyEmailFromModal()">Copy to Clipboard</button>
        </div>
    </div>
    
    <!-- Add Museum Modal -->
    <div class="modal" id="museum-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🏛️ Add Museum</h2>
                <button class="modal-close" onclick="closeModal('museum-modal')">&times;</button>
            </div>
            <form onsubmit="submitMuseum(event)">
                <div class="form-group">
                    <label>Museum Name *</label>
                    <input type="text" id="museum-name" required placeholder="e.g. British Museum">
                </div>
                <div class="form-group">
                    <label>Website</label>
                    <input type="url" id="museum-website" placeholder="https://...">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="museum-address" placeholder="Full address">
                </div>
                <div class="form-group">
                    <label>Personalization (what draws you to them?)</label>
                    <textarea id="museum-personalization" placeholder="e.g. engaging young people through your Schools Programme"></textarea>
                </div>
                <button type="submit" class="submit-btn">Add Museum ✨</button>
            </form>
        </div>
    </div>
    
    <!-- Add Contact Modal -->
    <div class="modal" id="contact-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>👤 Add Contact</h2>
                <button class="modal-close" onclick="closeModal('contact-modal')">&times;</button>
            </div>
            <form onsubmit="submitContact(event)">
                <div class="form-group">
                    <label>Full Name *</label>
                    <input type="text" id="contact-name" required placeholder="e.g. Sarah Johnson">
                </div>
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" id="contact-title" placeholder="e.g. Head of Learning">
                </div>
                <div class="form-group">
                    <label>Museum *</label>
                    <select id="contact-museum" required>
                        <option value="">Select museum...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="contact-email" placeholder="email@museum.org">
                </div>
                <div class="form-group">
                    <label>LinkedIn URL</label>
                    <input type="url" id="contact-linkedin" placeholder="https://linkedin.com/in/...">
                </div>
                <div class="form-group">
                    <label>Personalization (optional - will use museum's if blank)</label>
                    <textarea id="contact-personalization" placeholder="Custom personalization for this contact..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Add Contact ✨</button>
            </form>
        </div>
    </div>
    
    <script>
        let museums = [];
        let contacts = [];
        let currentTab = 'museums';
        let currentEmail = '';
        
        async function loadData() {
            const [museumsRes, contactsRes, statsRes] = await Promise.all([
                fetch('/api/museums').then(r => r.json()),
                fetch('/api/contacts').then(r => r.json()),
                fetch('/api/stats').then(r => r.json())
            ]);
            
            museums = museumsRes;
            contacts = contactsRes;
            
            document.getElementById('stat-museums').textContent = statsRes.total_museums;
            document.getElementById('stat-contacts').textContent = statsRes.total_contacts;
            document.getElementById('stat-emails').textContent = statsRes.contacts_with_email;
            document.getElementById('stat-sent').textContent = statsRes.emails_sent;
            document.getElementById('stat-replies').textContent = statsRes.positive_replies;
            
            // Populate museum dropdown
            const museumSelect = document.getElementById('contact-museum');
            museumSelect.innerHTML = '<option value="">Select museum...</option>' + 
                museums.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
            
            renderMuseums();
            renderContacts();
        }
        
        function renderMuseums() {
            const search = document.getElementById('search').value.toLowerCase();
            const interest = document.getElementById('filter-interest').value;
            
            const filtered = museums.filter(m => {
                if (search && !m.name.toLowerCase().includes(search) && !m.address?.toLowerCase().includes(search)) return false;
                if (interest && m.interest !== interest) return false;
                return true;
            });
            
            const tbody = document.getElementById('museums-body');
            tbody.innerHTML = filtered.map(m => `
                <tr>
                    <td>
                        <strong>${m.name}</strong>
                        ${m.website ? `<br><a href="${m.website}" target="_blank" class="link small">Visit website →</a>` : ''}
                    </td>
                    <td class="small truncate" title="${m.address || ''}">${m.address || '-'}</td>
                    <td class="small" style="max-width:250px;">${m.personalization || '-'}</td>
                    <td>
                        <select class="status-select" onchange="updateMuseum(${m.id}, 'interest', this.value)">
                            <option value="" ${!m.interest ? 'selected' : ''}>-</option>
                            <option value="Yes" ${m.interest === 'Yes' ? 'selected' : ''}>Yes ✓</option>
                            <option value="Maybe" ${m.interest === 'Maybe' ? 'selected' : ''}>Maybe</option>
                            <option value="No" ${m.interest === 'No' ? 'selected' : ''}>No</option>
                            <option value="Applied" ${m.interest === 'Applied' ? 'selected' : ''}>Applied 🎯</option>
                        </select>
                    </td>
                    <td>${m.contact_count}</td>
                    <td><span class="badge badge-${m.engagement === 'Engaged' ? 'engaged' : m.engagement === 'Pending' ? 'pending' : 'none'}">${m.engagement}</span></td>
                </tr>
            `).join('');
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="empty">No museums found</td></tr>';
            }
        }
        
        function renderContacts() {
            const search = document.getElementById('search').value.toLowerCase();
            const hasEmail = document.getElementById('filter-has-email').value;
            const status = document.getElementById('filter-status').value;
            
            const filtered = contacts.filter(c => {
                if (search && !c.name.toLowerCase().includes(search) && !c.museum?.toLowerCase().includes(search) && !c.title?.toLowerCase().includes(search)) return false;
                if (hasEmail === 'yes' && !c.email) return false;
                if (hasEmail === 'no' && c.email) return false;
                if (status === 'not-sent' && (c.email_status === 'Sent' || c.linkedin_status === 'Message Sent')) return false;
                if (status === 'sent' && c.email_status !== 'Sent' && c.linkedin_status !== 'Message Sent') return false;
                if (status === 'replied' && c.reply_status !== 'Positive Reply') return false;
                return true;
            });
            
            const tbody = document.getElementById('contacts-body');
            tbody.innerHTML = filtered.map(c => `
                <tr>
                    <td><strong>${c.name}</strong></td>
                    <td class="small">${c.title || '-'}</td>
                    <td class="small">${c.museum || '-'}</td>
                    <td class="small">${c.email || '<span style="color:#ccc;">No email</span>'}</td>
                    <td>
                        <select class="status-select ${c.email_status === 'Sent' ? 'sent' : ''}" onchange="updateContact(${c.id}, 'email_status', this.value)">
                            <option value="" ${!c.email_status ? 'selected' : ''}>-</option>
                            <option value="Not Sent" ${c.email_status === 'Not Sent' ? 'selected' : ''}>Not Sent</option>
                            <option value="Sent" ${c.email_status === 'Sent' ? 'selected' : ''}>Sent ✓</option>
                            <option value="Bounced" ${c.email_status === 'Bounced' ? 'selected' : ''}>Bounced</option>
                        </select>
                    </td>
                    <td>
                        <select class="status-select ${c.linkedin_status === 'Message Sent' ? 'sent' : ''}" onchange="updateContact(${c.id}, 'linkedin_status', this.value)">
                            <option value="" ${!c.linkedin_status ? 'selected' : ''}>-</option>
                            <option value="Not Sent" ${c.linkedin_status === 'Not Sent' ? 'selected' : ''}>Not Sent</option>
                            <option value="Connection Sent" ${c.linkedin_status === 'Connection Sent' ? 'selected' : ''}>Connected</option>
                            <option value="Message Sent" ${c.linkedin_status === 'Message Sent' ? 'selected' : ''}>Messaged ✓</option>
                        </select>
                    </td>
                    <td>
                        <select class="status-select ${c.reply_status === 'Positive Reply' ? 'positive' : c.reply_status === 'Negative Reply' ? 'negative' : ''}" onchange="updateContact(${c.id}, 'reply_status', this.value)">
                            <option value="" ${!c.reply_status ? 'selected' : ''}>-</option>
                            <option value="No Reply" ${c.reply_status === 'No Reply' ? 'selected' : ''}>No Reply</option>
                            <option value="Positive Reply" ${c.reply_status === 'Positive Reply' ? 'selected' : ''}>Positive! 🎉</option>
                            <option value="Negative Reply" ${c.reply_status === 'Negative Reply' ? 'selected' : ''}>Negative</option>
                            <option value="OOO" ${c.reply_status === 'OOO' ? 'selected' : ''}>OOO</option>
                        </select>
                    </td>
                    <td><button class="copy-btn" onclick="showEmail(${c.id})">View Email</button></td>
                </tr>
            `).join('');
            
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="empty">No contacts found</td></tr>';
            }
        }
        
        async function updateMuseum(id, field, value) {
            await fetch(`/api/museums/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ [field]: value })
            });
            loadData();
        }
        
        async function updateContact(id, field, value) {
            await fetch(`/api/contacts/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ [field]: value })
            });
            loadData();
        }
        
        function showEmail(contactId) {
            const contact = contacts.find(c => c.id === contactId);
            if (contact) {
                currentEmail = contact.personalized_email;
                document.getElementById('email-preview').textContent = currentEmail;
                document.getElementById('email-modal').classList.add('open');
            }
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('open');
        }
        
        function copyEmailFromModal() {
            navigator.clipboard.writeText(currentEmail).then(() => {
                const btn = document.getElementById('modal-copy-btn');
                btn.textContent = 'Copied! ✓';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy to Clipboard';
                    btn.classList.remove('copied');
                }, 2000);
            });
        }
        
        function openAddModal() {
            if (currentTab === 'museums') {
                document.getElementById('museum-modal').classList.add('open');
            } else {
                document.getElementById('contact-modal').classList.add('open');
            }
        }
        
        async function submitMuseum(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('museum-name').value,
                website: document.getElementById('museum-website').value,
                address: document.getElementById('museum-address').value,
                personalization: document.getElementById('museum-personalization').value
            };
            
            await fetch('/api/museums', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            closeModal('museum-modal');
            document.getElementById('museum-name').value = '';
            document.getElementById('museum-website').value = '';
            document.getElementById('museum-address').value = '';
            document.getElementById('museum-personalization').value = '';
            loadData();
        }
        
        async function submitContact(e) {
            e.preventDefault();
            const data = {
                name: document.getElementById('contact-name').value,
                title: document.getElementById('contact-title').value,
                museum: document.getElementById('contact-museum').value,
                email: document.getElementById('contact-email').value,
                linkedin: document.getElementById('contact-linkedin').value,
                personalization: document.getElementById('contact-personalization').value
            };
            
            await fetch('/api/contacts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            closeModal('contact-modal');
            document.getElementById('contact-name').value = '';
            document.getElementById('contact-title').value = '';
            document.getElementById('contact-museum').value = '';
            document.getElementById('contact-email').value = '';
            document.getElementById('contact-linkedin').value = '';
            document.getElementById('contact-personalization').value = '';
            loadData();
        }
        
        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentTab = tab.dataset.tab;
                
                document.getElementById('museums-view').style.display = currentTab === 'museums' ? 'block' : 'none';
                document.getElementById('contacts-view').style.display = currentTab === 'contacts' ? 'block' : 'none';
                
                document.getElementById('filter-interest').style.display = currentTab === 'museums' ? 'block' : 'none';
                document.getElementById('filter-status').style.display = currentTab === 'contacts' ? 'block' : 'none';
                document.getElementById('filter-has-email').style.display = currentTab === 'contacts' ? 'block' : 'none';
            });
        });
        
        // Search and filter
        document.getElementById('search').addEventListener('input', () => {
            if (currentTab === 'museums') renderMuseums();
            else renderContacts();
        });
        document.getElementById('filter-interest').addEventListener('change', renderMuseums);
        document.getElementById('filter-status').addEventListener('change', renderContacts);
        document.getElementById('filter-has-email').addEventListener('change', renderContacts);
        
        // Close modal on outside click
        document.querySelectorAll('.modal').forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target.classList.contains('modal')) {
                    e.target.classList.remove('open');
                }
            });
        });
        
        loadData();
    </script>
</body>
</html>
